name: Deploy to davidguevara.dev

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.davidguevara.dev
          username: claude@davidguevara.dev
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /
          protocol: ftp
          security: loose
          port: 21
          # No dangerous-content-replace — Namecheap keeps cgi-bin/.well-known server-side
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            **/.DS_Store
            .gitignore
